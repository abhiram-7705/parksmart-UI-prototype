<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ParkSmart Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<header class="navbar">
  <div class="logo">ParkSmart</div>

  <nav class="nav-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#" class="restricted">Rent Your Space</a>
    <a href="#" class="restricted">Dashboard</a>
  </nav>

  <div class="profile-menu">
    <div id="profileIcon" class="profile-icon">👤</div>
    <div id="profileDropdown" class="profile-dropdown hidden">
    </div>
  </div>
</header>
<div class="dashboard">
  <div class="view-toggle">
    <button class="active" onclick="showUser()">User Dashboard</button>
    <button onclick="showOwner()">Owner Dashboard</button>
  </div>
  <h2>My Bookings</h2>

  <!-- TOGGLE -->


  <!-- FILTER BAR -->
  <div class="filter-bar">

    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="searchInput" placeholder="Search bookings...">
      <div id="searchDropdown" class="dropdown"></div>
    </div>

    <select id="statusFilter">
      <option value="">Status</option>
      <option value="active">Active</option>
      <option value="upcoming">Upcoming</option>
      <option value="past">Past</option>
      <option value="cancelled">Cancelled</option>
    </select>

    <select id="typeFilter">
      <option value="">Type</option>
      <option value="public">Public</option>
      <option value="private">Private</option>
    </select>

    <select id="sortFilter">
      <option value="">Sort</option>
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
    </select>

    <button class="apply" onclick="applyFilters()">Apply</button>
    <button class="reset" onclick="resetFilters()">Reset</button>

  </div>

  <!-- STATUS -->
  <div class="stats">

    <div class="stat-card active" onclick="filterByStatus('active')">
      <h3 id="activeCount">0</h3>
      <p>Active</p>
      <span>Currently parked</span>
    </div>



<div class="stat-card upcoming" onclick="filterByStatus('upcoming')">
      <h3 id="upcomingCount">0</h3>
      <p>Upcoming</p>
      <span>Starting soon</span>
    </div>

<div class="stat-card past" onclick="filterByStatus('past')">
      <h3 id="pastCount">0</h3>
      <p>Past</p>
      <span>Completed bookings</span>
    </div>

<div class="stat-card cancelled" onclick="filterByStatus('cancelled')">
      <h3 id="cancelCount">0</h3>
      <p>Cancelled</p>
      <span>Refund processed</span>
    </div>

  </div>

  <!-- BOOKINGS -->
  <div class="bookings-container">
    <div class="bookings-header">
      <h3>Bookings</h3>
      <span id="bookingCount"></span>
    </div>

    <div id="bookingList"></div>
  </div>

</div>

<!-- OWNER PAGE -->
<div id="ownerView" class="owner-view">
  <h2>🚧 Owner Dashboard</h2>
  <p>Under Construction</p>
</div>

<!-- MODAL -->
<div id="overlay" class="overlay" onclick="closeModal()"></div>
<div id="modal" class="modal"></div>

<script src="dashboard.js"></script>
</body>
</html>
